apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hospital-ai-backend
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/execution-environment: gen2
    spec:
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/hospital-ai-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api-key
              key: latest
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-url
              key: latest
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
